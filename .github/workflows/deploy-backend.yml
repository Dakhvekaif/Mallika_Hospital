name: Deploy Mallika Hospital Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.GODADDY_SERVER_IP }}
          username: ${{ secrets.GODADDY_FTP_USERNAME }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          local-dir: backend/
          server-dir: Mallika-Backend/backend/
          create-dir: true # 👈 ADD THIS LINE
          exclude: |
            **/venv/**
            **/.git/**
            **/db.sqlite3
            **/.env
          state-name: .ftp-deploy-sync-state-backend.json

      - name: Trigger Passenger Server Restart
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.GODADDY_SERVER_IP }}
          username: ${{ secrets.GODADDY_FTP_USERNAME }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          local-dir: backend/tmp/
          server-dir: Mallika-Backend/backend/tmp/
          create-dir: true # 👈 ADD THIS LINE ALSO